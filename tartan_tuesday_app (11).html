                                </button>

                                <button className="btn btn-secondary" onClick={resetForm}>
                                    <span style={{position: 'relative', zIndex: 1}}>Clear Form</span>
                                </button>
                            </div>

                            <div className="card">
                                <h2>Prize Catalog</h2>
                                <img src="/mnt/user-data/uploads/1765906311327_image.png" alt="Prize Catalog" style={{width: '100%', borderRadius: '12px', border: '2px solid rgba(220, 38, 38, 0.3)'}} />
                            </div>
                        </div>
                    )}

                    {activeTab === 'statistics' && (
                        <div className="card full-width">
                            <h2>Statistics Dashboard</h2>
                            <div className="stats-grid">
                                <div className="stat-card">
                                    <div className="stat-content">
                                        <div className="stat-value">{stats.uniqueStudents}</div>
                                        <div className="stat-label">Unique Students</div>
                                    </div>
                                </div>
                                <div className="stat-card">
                                    <div className="stat-content">
                                        <div className="stat-value">{stats.todayVisits}</div>
                                        <div className="stat-label">Today's Visits</div>
                                    </div>
                                </div>
                                <div className="stat-card">
                                    <div className="stat-content">
                                        <div className="stat-value">{stats.totalVisits}</div>
                                        <div className="stat-label">Total Visits</div>
                                    </div>
                                </div>
                                <div className="stat-card">
                                    <div className="stat-content">
                                        <div className="stat-value">{stats.totalPointsEarned}</div>
                                        <div className="stat-label">Total Points Earned</div>
                                    </div>
                                </div>
                                <div className="stat-card">
                                    <div className="stat-content">
                                        <div className="stat-value">{stats.totalPointsRedeemed}</div>
                                        <div className="stat-label">Points Redeemed</div>
                                    </div>
                                </div>
                                <div className="stat-card">
                                    <div className="stat-content">
                                        <div className="stat-value">{stats.prizesRedeemed}</div>
                                        <div className="stat-label">Prizes Redeemed</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {activeTab === 'history' && (
                        <div className="card full-width">
                            <h2>Student History</h2>
                            <div className="search-bar">
                                <input
                                    type="text"
                                    placeholder="Search by name or ID..."
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                />
                            </div>
                            <div style={{overflowX: 'auto'}}>
                                <table className="student-history-table">
                                    <thead>
                                        <tr>
                                            <th 
                                                onClick={() => handleSort('id')}
                                                style={{cursor: 'pointer', userSelect: 'none'}}
                                            >
                                                ID {sortBy === 'id' && (sortOrder === 'asc' ? '▲' : '▼')}
                                            </th>
                                            <th 
                                                onClick={() => handleSort('name')}
                                                style={{cursor: 'pointer', userSelect: 'none'}}
                                            >
                                                Name {sortBy === 'name' && (sortOrder === 'asc' ? '▲' : '▼')}
                                            </th>
                                            <th>Email</th>
                                            <th 
                                                onClick={() => handleSort('visits')}
                                                style={{cursor: 'pointer', userSelect: 'none'}}
                                            >
                                                Visits {sortBy === 'visits' && (sortOrder === 'asc' ? '▲' : '▼')}
                                            </th>
                                            <th 
                                                onClick={() => handleSort('earned')}
                                                style={{cursor: 'pointer', userSelect: 'none'}}
                                            >
                                                Earned {sortBy === 'earned' && (sortOrder === 'asc' ? '▲' : '▼')}
                                            </th>
                                            <th 
                                                onClick={() => handleSort('redeemed')}
                                                style={{cursor: 'pointer', userSelect: 'none'}}
                                            >
                                                Redeemed {sortBy === 'redeemed' && (sortOrder === 'asc' ? '▲' : '▼')}
                                            </th>
                                            <th 
                                                onClick={() => handleSort('current')}
                                                style={{cursor: 'pointer', userSelect: 'none'}}
                                            >
                                                Current {sortBy === 'current' && (sortOrder === 'asc' ? '▲' : '▼')}
                                            </th>
                                            <th 
                                                onClick={() => handleSort('lastVisit')}
                                                style={{cursor: 'pointer', userSelect: 'none'}}
                                            >
                                                Last Visit {sortBy === 'lastVisit' && (sortOrder === 'asc' ? '▲' : '▼')}
                                            </th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {sortedStudentHistory.map(student => (
                                            <tr key={student.id}>
                                                <td>{student.id}</td>
                                                <td>{student.firstName} {student.lastName}</td>
                                                <td>{student.email}</td>
                                                <td>{student.visits}</td>
                                                <td>{student.totalEarned}</td>
                                                <td>{student.totalRedeemed}</td>
                                                <td style={{fontWeight: 'bold', color: '#dc2626', fontSize: '1.1em'}}>
                                                    {student.cumulativePoints}
                                                </td>
                                                <td>{student.lastVisit}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}

                    {activeTab === 'data' && (
                        <div className="card full-width">
                            <h2>Data Management</h2>
                            <div className="data-management">
                                <div className="file-input-wrapper">
                                    <input
                                        type="file"
                                        id="roster-import"
                                        accept=".xlsx,.xls"
                                        onChange={handleImportRoster}
                                    />
                                    <label htmlFor="roster-import" className="file-input-label">
                                        📁 Import Student Roster<br/>
                                        <small style={{fontSize: '0.85em', opacity: 0.8}}>(Excel - Students sheet)</small>
                                    </label>
                                </div>
                                <div className="file-input-wrapper">
                                    <input
                                        type="file"
                                        id="swipes-import"
                                        accept=".xlsx,.xls"
                                        onChange={handleImportSwipes}
                                    />
                                    <label htmlFor="swipes-import" className="file-input-label">
                                        📊 Import Existing Swipes<br/>
                                        <small style={{fontSize: '0.85em', opacity: 0.8}}>(Excel - Swipes sheet - APPENDS)</small>
                                    </label>
                                </div>
                                <button className="btn btn-primary" onClick={handleExportData} style={{gridColumn: '1 / -1'}}>
                                    <span style={{position: 'relative', zIndex: 1}}>💾 Export All Data</span>
                                </button>
                                <button
                                    className="btn btn-secondary"
                                    onClick={async () => {
                                        if (!SYNC_ENABLED) {
                                            showAlert('Google Sheets sync is not configured. Set the SHEETS_API_URL in the code.', 'warning');
                                            return;
                                        }
                                        setSyncStatus('loading');
                                        setSyncMessage('Refreshing from Google Sheets...');
                                        try {
                                            const data = await SheetsAPI.loadAllData();
                                            if (data && !data.error) {
                                                if (data.students?.length > 0) setStudents(data.students);
                                                if (data.swipes) setSwipes(data.swipes);
                                                showAlert(`Refreshed: ${data.students?.length || 0} students, ${data.swipes?.length || 0} swipes`, 'success');
                                                setSyncStatus('success');
                                                setSyncMessage('Synced');
                                                setTimeout(() => setSyncStatus('idle'), 2000);
                                            }
                                        } catch (error) {
                                            showAlert('Failed to refresh from Google Sheets: ' + error.message, 'error');
                                            setSyncStatus('error');
                                            setSyncMessage('Refresh failed');
                                        }
                                    }}
                                    style={{gridColumn: '1 / -1', marginTop: '10px'}}
                                >
                                    <span style={{position: 'relative', zIndex: 1}}>🔄 Refresh from Google Sheets</span>
                                </button>
                            </div>

                            <div className="info-box">
                                <h3>Current Data Status</h3>
                                <p>Students in Roster: <strong>{students.length}</strong></p>
                                <p>Total Swipes/Transactions: <strong>{swipes.length}</strong></p>
                                <p>Recent Activities Logged: <strong>{recentActivities.length}</strong></p>
                                <p>Google Sheets Sync: <strong style={{color: SYNC_ENABLED ? '#4ade80' : '#fca5a5'}}>
                                    {SYNC_ENABLED ? 'Enabled' : 'Not Configured'}
                                </strong></p>
                            </div>

                            <div className="info-box" style={{background: 'rgba(251, 191, 36, 0.1)', borderColor: 'rgba(251, 191, 36, 0.5)'}}>
                                <h3 style={{color: '#fbbf24'}}>⚠️ Important Notes</h3>
                                <ul style={{marginLeft: '20px', color: '#e0e0e0', lineHeight: '1.8'}}>
                                    <li>Data is synced to Google Sheets in real-time when connected</li>
                                    <li>localStorage serves as a local cache for instant responsiveness</li>
                                    <li><strong>Import Existing Swipes</strong> will ADD to current data (not replace)</li>
                                    <li>If Sheets sync fails, data is preserved locally</li>
                                    <li>Use "Refresh from Google Sheets" to manually re-sync</li>
                                    <li>Students roster is read from Google Sheets automatically</li>
                                </ul>
                            </div>
                        </div>
                    )}

                    <div style={{
                        textAlign: 'center',
                        padding: '30px 20px',
                        marginTop: '40px',
                        borderTop: '2px solid rgba(220, 38, 38, 0.3)',
                        color: '#a0a0a0',
                        fontSize: '0.9em',
                        letterSpacing: '1px'
                    }}>
                        © Ananya Shrimali
                    </div>
                </div>
            );
        }

        ReactDOM.render(<TartanTuesdayApp />, document.getElementById('root'));
    </script>
</body>
</html>
