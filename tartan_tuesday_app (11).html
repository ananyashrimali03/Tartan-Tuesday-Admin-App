<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tartan Tuesday Manager</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a0000 0%, #0a0a0a 50%, #1a0000 100%);
            background-attachment: fixed;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            color: #ffffff;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(220, 38, 38, 0.03) 10px, rgba(220, 38, 38, 0.03) 20px),
                repeating-linear-gradient(-45deg, transparent, transparent 10px, rgba(0, 0, 0, 0.3) 10px, rgba(0, 0, 0, 0.3) 20px);
            z-index: 0;
            pointer-events: none;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .header {
            background: linear-gradient(135deg, #1f1f1f 0%, #0a0a0a 100%);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(220, 38, 38, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            margin-bottom: 30px;
            text-align: center;
            border: 2px solid rgba(220, 38, 38, 0.5);
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(220, 38, 38, 0.1) 0%, transparent 70%);
            animation: pulse 4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        .header-content {
            position: relative;
            z-index: 1;
        }

        .header h1 {
            color: #dc2626;
            font-size: 3em;
            margin-bottom: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 
                0 0 20px rgba(220, 38, 38, 0.5),
                0 0 40px rgba(220, 38, 38, 0.3),
                0 2px 4px rgba(0, 0, 0, 0.8);
        }

        .header p {
            color: #a0a0a0;
            font-size: 1.1em;
            font-weight: 300;
            letter-spacing: 2px;
        }

        .tartans-badge {
            display: inline-block;
            background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%);
            color: white;
            padding: 10px 30px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.85em;
            letter-spacing: 3px;
            margin-bottom: 20px;
            box-shadow: 
                0 4px 15px rgba(220, 38, 38, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: linear-gradient(135deg, #1f1f1f 0%, #0f0f0f 100%);
            padding: 35px;
            border-radius: 24px;
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(220, 38, 38, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(220, 38, 38, 0.3);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(220, 38, 38, 0.1), transparent);
            transition: left 0.5s;
        }

        .card:hover::before {
            left: 100%;
        }

        .card h2 {
            color: #dc2626;
            margin-bottom: 25px;
            font-size: 1.6em;
            border-bottom: 2px solid rgba(220, 38, 38, 0.3);
            padding-bottom: 15px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            color: #e0e0e0;
            margin-bottom: 10px;
            font-weight: 600;
            font-size: 0.95em;
            letter-spacing: 0.5px;
        }

        .input-group input, .input-group select {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid rgba(220, 38, 38, 0.3);
            border-radius: 12px;
            font-size: 1em;
            transition: all 0.3s;
            background: rgba(0, 0, 0, 0.3);
            color: #ffffff;
            font-weight: 500;
        }

        .input-group input::placeholder {
            color: #666;
        }

        .input-group input:focus, .input-group select:focus {
            outline: none;
            border-color: #dc2626;
            box-shadow: 
                0 0 0 4px rgba(220, 38, 38, 0.2),
                0 0 20px rgba(220, 38, 38, 0.3);
            background: rgba(0, 0, 0, 0.5);
        }

        .points-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .point-btn {
            padding: 18px;
            border: 2px solid rgba(220, 38, 38, 0.3);
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.3);
            cursor: pointer;
            font-weight: 700;
            font-size: 1.1em;
            transition: all 0.3s;
            text-align: center;
            color: #ffffff;
            position: relative;
            overflow: hidden;
        }

        .point-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(220, 38, 38, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.3s, height 0.3s;
        }

        .point-btn:hover::before {
            width: 200%;
            height: 200%;
        }

        .point-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(220, 38, 38, 0.3);
            border-color: #dc2626;
        }

        .point-btn.selected {
            background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%);
            color: white;
            border-color: #dc2626;
            box-shadow: 
                0 8px 25px rgba(220, 38, 38, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .point-btn.free-spin {
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
            color: #000;
            font-weight: 800;
            border-color: #fbbf24;
        }

        .point-btn.free-spin.selected {
            box-shadow: 0 8px 25px rgba(251, 191, 36, 0.5);
        }

        .btn {
            padding: 16px 32px;
            border: none;
            border-radius: 12px;
            font-size: 1.05em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            letter-spacing: 1px;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.5s, height 0.5s;
        }

        .btn:hover::before {
            width: 300%;
            height: 300%;
        }

        .btn-primary {
            background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%);
            color: white;
            box-shadow: 
                0 4px 15px rgba(220, 38, 38, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 
                0 8px 30px rgba(220, 38, 38, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .btn-primary:disabled {
            background: #3f3f3f;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-secondary {
            background: rgba(0, 0, 0, 0.5);
            color: white;
            margin-top: 12px;
            border: 2px solid rgba(220, 38, 38, 0.3);
        }

        .btn-secondary:hover {
            background: rgba(0, 0, 0, 0.7);
            border-color: #dc2626;
            transform: translateY(-2px);
        }

        .student-info {
            background: linear-gradient(135deg, rgba(220, 38, 38, 0.15) 0%, rgba(0, 0, 0, 0.5) 100%);
            padding: 25px;
            border-radius: 16px;
            margin-bottom: 20px;
            border: 2px solid rgba(220, 38, 38, 0.3);
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .student-info h3 {
            color: #dc2626;
            margin-bottom: 20px;
            font-size: 1.3em;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .student-info-grid {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 12px 25px;
        }

        .student-info-label {
            font-weight: 700;
            color: #a0a0a0;
            text-transform: uppercase;
            font-size: 0.85em;
            letter-spacing: 1px;
        }

        .student-info-value {
            color: #ffffff;
            font-weight: 500;
        }

        .alert {
            padding: 18px 24px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-weight: 600;
            border: 2px solid;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .alert-success {
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.2) 0%, rgba(22, 163, 74, 0.2) 100%);
            color: #4ade80;
            border-color: #22c55e;
        }

        .alert-error {
            background: linear-gradient(135deg, rgba(220, 38, 38, 0.2) 0%, rgba(153, 27, 27, 0.2) 100%);
            color: #fca5a5;
            border-color: #dc2626;
        }

        .alert-warning {
            background: linear-gradient(135deg, rgba(251, 191, 36, 0.2) 0%, rgba(245, 158, 11, 0.2) 100%);
            color: #fbbf24;
            border-color: #f59e0b;
        }

        .alert-info {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.2) 0%, rgba(37, 99, 235, 0.2) 100%);
            color: #60a5fa;
            border-color: #3b82f6;
        }

        .prize-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .prize-item {
            padding: 20px;
            border: 2px solid rgba(220, 38, 38, 0.3);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            background: rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .prize-item::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(220, 38, 38, 0.2) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .prize-item:hover::before {
            opacity: 1;
        }

        .prize-item:hover {
            border-color: #dc2626;
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 30px rgba(220, 38, 38, 0.3);
        }

        .prize-item.selected {
            background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%);
            color: white;
            border-color: #dc2626;
            box-shadow: 
                0 10px 30px rgba(220, 38, 38, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .prize-points {
            font-weight: 800;
            font-size: 1.5em;
            color: #dc2626;
            margin-bottom: 8px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .prize-item.selected .prize-points {
            color: white;
        }

        .prize-name {
            font-size: 0.95em;
            font-weight: 600;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%);
            padding: 30px;
            border-radius: 16px;
            color: white;
            box-shadow: 
                0 10px 30px rgba(220, 38, 38, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 70%);
            animation: rotate 10s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .stat-card:nth-child(2n) {
            background: linear-gradient(135deg, #0a0a0a 0%, #1f1f1f 100%);
            border: 2px solid rgba(220, 38, 38, 0.4);
        }

        .stat-content {
            position: relative;
            z-index: 1;
        }

        .stat-value {
            font-size: 3em;
            font-weight: 900;
            margin-bottom: 5px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .stat-label {
            font-size: 0.95em;
            opacity: 0.9;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .data-management {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }

        .file-input-wrapper input[type=file] {
            position: absolute;
            left: -9999px;
        }

        .file-input-label {
            display: block;
            padding: 20px;
            border: 2px dashed rgba(220, 38, 38, 0.5);
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(220, 38, 38, 0.1);
            color: #dc2626;
            font-weight: 700;
        }

        .file-input-label:hover {
            background: rgba(220, 38, 38, 0.2);
            border-color: #dc2626;
            transform: scale(1.02);
        }

        .recent-activities {
            max-height: 400px;
            overflow-y: auto;
        }

        .activity-item {
            padding: 18px;
            border-left: 4px solid #dc2626;
            background: rgba(220, 38, 38, 0.1);
            margin-bottom: 12px;
            border-radius: 0 12px 12px 0;
            transition: all 0.3s;
        }

        .activity-item:hover {
            background: rgba(220, 38, 38, 0.15);
            transform: translateX(5px);
        }

        .activity-time {
            font-size: 0.85em;
            color: #a0a0a0;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .activity-details {
            color: #ffffff;
            font-weight: 500;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        .tab-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 14px 28px;
            border: 2px solid rgba(220, 38, 38, 0.3);
            background: rgba(0, 0, 0, 0.3);
            cursor: pointer;
            font-weight: 700;
            color: #ffffff;
            border-radius: 12px;
            transition: all 0.3s;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-size: 0.9em;
        }

        .tab-btn:hover {
            background: rgba(220, 38, 38, 0.2);
            border-color: #dc2626;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(220, 38, 38, 0.3);
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%);
            color: white;
            border-color: #dc2626;
            box-shadow: 
                0 5px 20px rgba(220, 38, 38, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .search-bar {
            margin-bottom: 20px;
        }

        .search-bar input {
            width: 100%;
            padding: 14px 20px;
            border: 2px solid rgba(220, 38, 38, 0.3);
            border-radius: 12px;
            font-size: 1em;
            background: rgba(0, 0, 0, 0.3);
            color: #ffffff;
            font-weight: 500;
        }

        .search-bar input::placeholder {
            color: #666;
        }

        .search-bar input:focus {
            border-color: #dc2626;
            outline: none;
            box-shadow: 0 0 0 4px rgba(220, 38, 38, 0.2);
            background: rgba(0, 0, 0, 0.5);
        }

        .student-history-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        .student-history-table th,
        .student-history-table td {
            padding: 14px;
            text-align: left;
            border-bottom: 1px solid rgba(220, 38, 38, 0.2);
        }

        .student-history-table th {
            background: linear-gradient(135deg, rgba(220, 38, 38, 0.2) 0%, rgba(0, 0, 0, 0.3) 100%);
            font-weight: 700;
            color: #dc2626;
            text-transform: uppercase;
            font-size: 0.85em;
            letter-spacing: 1px;
            transition: all 0.3s;
        }

        .student-history-table th:hover {
            background: linear-gradient(135deg, rgba(220, 38, 38, 0.3) 0%, rgba(0, 0, 0, 0.4) 100%);
            color: #ef4444;
        }

        .student-history-table tr:hover {
            background: rgba(220, 38, 38, 0.1);
        }

        .student-history-table td {
            color: #e0e0e0;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
            padding: 15px;
            background: rgba(220, 38, 38, 0.1);
            border-radius: 10px;
            border: 2px solid rgba(220, 38, 38, 0.3);
        }

        .checkbox-group input[type="checkbox"] {
            width: 22px;
            height: 22px;
            cursor: pointer;
            accent-color: #dc2626;
        }

        .checkbox-group label {
            margin: 0;
            cursor: pointer;
            font-weight: 600;
            color: #ffffff;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 12px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 6px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%);
            border-radius: 6px;
            border: 2px solid rgba(0, 0, 0, 0.3);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%);
        }

        .info-box {
            margin-top: 20px;
            padding: 20px;
            background: rgba(220, 38, 38, 0.1);
            border-radius: 12px;
            border: 2px solid rgba(220, 38, 38, 0.3);
        }

        .info-box h3 {
            margin-bottom: 15px;
            color: #dc2626;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .info-box p {
            margin-bottom: 8px;
            color: #e0e0e0;
        }

        .info-box strong {
            color: #ffffff;
        }

        .sync-indicator {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.85em;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .sync-indicator.syncing {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.9) 0%, rgba(37, 99, 235, 0.9) 100%);
            color: white;
            border: 1px solid rgba(59, 130, 246, 0.5);
        }

        .sync-indicator.success {
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.9) 0%, rgba(22, 163, 74, 0.9) 100%);
            color: white;
            border: 1px solid rgba(34, 197, 94, 0.5);
        }

        .sync-indicator.error {
            background: linear-gradient(135deg, rgba(220, 38, 38, 0.9) 0%, rgba(153, 27, 27, 0.9) 100%);
            color: white;
            border: 1px solid rgba(220, 38, 38, 0.5);
        }

        .sync-indicator.loading {
            background: linear-gradient(135deg, rgba(251, 191, 36, 0.9) 0%, rgba(245, 158, 11, 0.9) 100%);
            color: #000;
            border: 1px solid rgba(251, 191, 36, 0.5);
        }

        .sync-spinner {
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            flex-direction: column;
            gap: 20px;
        }

        .loading-overlay h2 {
            color: #dc2626;
            font-size: 1.5em;
        }

        .loading-overlay p {
            color: #a0a0a0;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Prize catalog matching the image
        const PRIZES = [
            { points: 30, name: "Vest/Chair", tier: "Tier 1" },
            { points: 25, name: "Blanket/Tent/Mug", tier: "Tier 2" },
            { points: 20, name: "Mousepad/Towel", tier: "Tier 3" },
            { points: 10, name: "Sunglasses/Tumbler/Notepad", tier: "Tier 4" }
        ];

        // Point options from the wheel
        const POINT_OPTIONS = [1, 2, 3, 5, 10];

        // Google Sheets API Configuration
        // PASTE YOUR DEPLOYED APPS SCRIPT URL BELOW:
        const SHEETS_API_URL = 'https://script.google.com/macros/s/AKfycbz11UC-qVIIklQwNCKchfV5wo0yhuBW-W0xEPdnCtX0DaLzfLJ01rbCyziyZVxhEHW3kg/exec';
        const SYNC_ENABLED = SHEETS_API_URL !== 'YOUR_APPS_SCRIPT_URL_HERE';

        // Google Sheets API Helper
        const SheetsAPI = {
            async get(action) {
                if (!SYNC_ENABLED) return null;
                const url = SHEETS_API_URL + '?action=' + encodeURIComponent(action);
                const response = await fetch(url, { redirect: 'follow' });
                if (!response.ok) throw new Error('HTTP ' + response.status);
                const data = await response.json();
                if (data.error) throw new Error(data.error);
                return data;
            },

            async post(payload) {
                if (!SYNC_ENABLED) return null;
                // Route writes through GET to avoid CORS issues with POST
                let url = SHEETS_API_URL + '?action=' + encodeURIComponent(payload.action);
                if (payload.data) {
                    url += '&data=' + encodeURIComponent(JSON.stringify(payload.data));
                }
                if (payload.studentId) {
                    url += '&studentId=' + encodeURIComponent(payload.studentId);
                }
                if (payload.date) {
                    url += '&date=' + encodeURIComponent(payload.date);
                }
                const response = await fetch(url, { redirect: 'follow' });
                if (!response.ok) throw new Error('HTTP ' + response.status);
                const data = await response.json();
                if (data.error) throw new Error(data.error);
                return data;
            },

            async loadAllData() {
                return this.get('getAllData');
            },

            async addSwipe(swipeData) {
                return this.post({ action: 'addSwipe', data: swipeData });
            },

            async deleteSwipes(studentId, date) {
                return this.post({ action: 'deleteSwipes', studentId: studentId, date: date });
            },

            async bulkAddSwipes(swipesArray) {
                // Smaller batches since data is URL-encoded (URL length limits)
                const BATCH_SIZE = 20;
                let totalAdded = 0;
                for (let i = 0; i < swipesArray.length; i += BATCH_SIZE) {
                    const batch = swipesArray.slice(i, i + BATCH_SIZE);
                    await this.post({ action: 'bulkAddSwipes', data: batch });
                    totalAdded += batch.length;
                }
                return { success: true, count: totalAdded };
            }
        };

        function TartanTuesdayApp() {
            const [activeTab, setActiveTab] = useState('check-in');
            const [studentId, setStudentId] = useState('');
            const [selectedPoints, setSelectedPoints] = useState(null);
            const [freeSpin, setFreeSpin] = useState(false);
            const [freeSpinActive, setFreeSpinActive] = useState(false);
            const [firstSpinPoints, setFirstSpinPoints] = useState(0);
            const [studentInfo, setStudentInfo] = useState(null);
            const [selectedPrize, setSelectedPrize] = useState(null);
            const [alert, setAlert] = useState(null);
            const [students, setStudents] = useState([]);
            const [swipes, setSwipes] = useState([]);
            const [recentActivities, setRecentActivities] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [sortBy, setSortBy] = useState('lastVisit'); // Default sort
            const [sortOrder, setSortOrder] = useState('desc'); // 'asc' or 'desc'
            const inputRef = useRef(null);
            const [syncStatus, setSyncStatus] = useState('idle');
            const [syncMessage, setSyncMessage] = useState('');
            const [isInitialLoading, setIsInitialLoading] = useState(SYNC_ENABLED);

            // Load data: Phase 1 from localStorage (instant), Phase 2 from Google Sheets (async)
            useEffect(() => {
                // Phase 1: Load from localStorage immediately
                try {
                    console.log('Phase 1: Loading from localStorage...');
                    const savedStudents = localStorage.getItem('tartanStudents');
                    const savedSwipes = localStorage.getItem('tartanSwipes');
                    const savedActivities = localStorage.getItem('tartanActivities');

                    if (savedStudents) setStudents(JSON.parse(savedStudents));
                    if (savedSwipes) setSwipes(JSON.parse(savedSwipes));
                    if (savedActivities) setRecentActivities(JSON.parse(savedActivities));
                    console.log('Phase 1 complete');
                } catch (error) {
                    console.error('localStorage load error:', error);
                }

                // Phase 2: Load from Google Sheets (async, overwrites local data)
                if (SYNC_ENABLED) {
                    setSyncStatus('loading');
                    setSyncMessage('Loading from Google Sheets...');

                    SheetsAPI.loadAllData()
                        .then(data => {
                            if (data && !data.error) {
                                console.log('Phase 2: Loaded from Sheets -',
                                    data.students?.length, 'students,',
                                    data.swipes?.length, 'swipes');

                                if (data.students && data.students.length > 0) {
                                    setStudents(data.students);
                                }
                                if (data.swipes) {
                                    setSwipes(data.swipes);
                                }

                                setSyncStatus('success');
                                setSyncMessage('Synced with Google Sheets');
                                setTimeout(() => setSyncStatus('idle'), 3000);
                            }
                        })
                        .catch(error => {
                            console.error('Phase 2 (Sheets load) failed:', error);
                            setSyncStatus('error');
                            setSyncMessage('Offline mode - using local data');
                        })
                        .finally(() => {
                            setIsInitialLoading(false);
                        });
                }
            }, []);

            // Save data to localStorage whenever it changes
            useEffect(() => {
                localStorage.setItem('tartanStudents', JSON.stringify(students));
            }, [students]);

            // Save data to localStorage whenever it changes
            useEffect(() => {
                // Skip saving if swipes array is very large and just changed (importing)
                if (swipes.length > 100) {
                    // Use a timeout to batch the save
                    const timeoutId = setTimeout(() => {
                        console.log('Saving', swipes.length, 'swipes to localStorage...');
                        try {
                            localStorage.setItem('tartanSwipes', JSON.stringify(swipes));
                            console.log('Save successful');
                        } catch (e) {
                            console.error('LocalStorage save failed:', e);
                        }
                    }, 1000);
                    return () => clearTimeout(timeoutId);
                } else {
                    localStorage.setItem('tartanSwipes', JSON.stringify(swipes));
                }
            }, [swipes]);

            useEffect(() => {
                if (recentActivities.length > 20) {
                    const timeoutId = setTimeout(() => {
                        localStorage.setItem('tartanActivities', JSON.stringify(recentActivities));
                    }, 500);
                    return () => clearTimeout(timeoutId);
                } else {
                    localStorage.setItem('tartanActivities', JSON.stringify(recentActivities));
                }
            }, [recentActivities]);

            // Focus input when tab changes
            useEffect(() => {
                if (activeTab === 'check-in' && inputRef.current) {
                    inputRef.current.focus();
                }
            }, [activeTab]);

            const showAlert = (message, type) => {
                setAlert({ message, type });
                setTimeout(() => setAlert(null), 5000);
            };

            const getTodaysDate = () => {
                return new Date().toISOString().split('T')[0];
            };

            const hasSpunToday = (id) => {
                const today = getTodaysDate();
                return swipes.some(swipe => 
                    swipe.studentId === id && 
                    swipe.date === today &&
                    swipe.pointsEarned > 0
                );
            };

            const lookupStudent = (id) => {
                const student = students.find(s => s.id === id);
                if (student) {
                    const cumulativePoints = calculateCumulativePoints(id);
                    const alreadySpun = hasSpunToday(id);
                    
                    // Always return student info with cumulative points
                    const studentWithPoints = {
                        ...student,
                        cumulativePoints: cumulativePoints,
                        isFirstTime: !swipes.some(s => s.studentId === id),
                        visitCount: swipes.filter(s => s.studentId === id && s.pointsEarned > 0).length,
                        alreadySpunToday: alreadySpun
                    };
                    
                    return studentWithPoints;
                }
                showAlert('Student not found in roster. Please check the ID.', 'error');
                return null;
            };

            const calculateCumulativePoints = (id) => {
                const studentSwipes = swipes.filter(s => s.studentId === id);
                const earned = studentSwipes.reduce((sum, s) => sum + (s.pointsEarned || 0), 0);
                const redeemed = studentSwipes.reduce((sum, s) => sum + (s.pointsRedeemed || 0), 0);
                return earned - redeemed;
            };

            const handleStudentIdChange = (e) => {
                const value = e.target.value.replace(/\D/g, ''); // Only numbers
                if (value.length <= 9) {
                    setStudentId(value);
                }

                // Auto-lookup when 9 digits are entered
                if (value.length === 9) {
                    const student = lookupStudent(value);
                    if (student) {
                        setStudentInfo(student);
                        
                        // Show warning if already spun today
                        if (student.alreadySpunToday) {
                            showAlert('⚠️ This student has already spun the wheel today!', 'warning');
                        }
                    }
                }
            };

            const handleCheckIn = () => {
                if (!studentInfo) {
                    showAlert('Please enter a valid student ID', 'error');
                    return;
                }

                // Prevent check-in if already spun today
                if (studentInfo.alreadySpunToday) {
                    showAlert('❌ Cannot check in - student has already spun today!', 'error');
                    return;
                }

                if (selectedPoints === null) {
                    showAlert('Please select the points earned from wheel spin', 'error');
                    return;
                }

                // Handle Free Spin scenario
                if (selectedPoints === 'free' && !freeSpinActive) {
                    // First spin landed on FREE SPIN
                    setFreeSpinActive(true);
                    setFirstSpinPoints(2); // Free spin gives 2 points
                    setSelectedPoints(null);
                    showAlert('🎰 FREE SPIN! Student gets 2 points + another spin. Select the second spin result now.', 'info');
                    return;
                }

                // Calculate total points (includes free spin bonus if applicable)
                let totalPoints = selectedPoints;
                let message = '';
                
                if (freeSpinActive) {
                    // This is the second spin after a free spin
                    totalPoints = firstSpinPoints + selectedPoints; // 2 + second spin
                    message = ` (2 from Free Spin + ${selectedPoints} from second spin)`;
                }

                const newSwipe = {
                    studentId: studentInfo.id,
                    firstName: studentInfo.firstName,
                    lastName: studentInfo.lastName,
                    email: studentInfo.email,
                    degreeLevel: studentInfo.degreeLevel,
                    pointsEarned: totalPoints,
                    pointsRedeemed: 0,
                    prizeRedeemed: null,
                    size: null,
                    date: getTodaysDate(),
                    timestamp: new Date().toISOString()
                };

                // 1. Update local state immediately
                setSwipes([...swipes, newSwipe]);

                const activity = {
                    timestamp: new Date().toISOString(),
                    type: 'check-in',
                    message: `${studentInfo.firstName} ${studentInfo.lastName} earned ${totalPoints} points${message}${studentInfo.isFirstTime ? ' (First Visit!)' : ''}`
                };
                setRecentActivities([activity, ...recentActivities.slice(0, 49)]);

                showAlert(`✓ Check-in successful! ${studentInfo.firstName} earned ${totalPoints} points${message}`, 'success');
                resetForm();

                // 2. Sync to Google Sheets (async, non-blocking)
                if (SYNC_ENABLED) {
                    setSyncStatus('syncing');
                    setSyncMessage('Saving to Google Sheets...');
                    SheetsAPI.addSwipe(newSwipe)
                        .then(() => {
                            setSyncStatus('success');
                            setSyncMessage('Saved to Google Sheets');
                            setTimeout(() => setSyncStatus('idle'), 2000);
                        })
                        .catch(error => {
                            console.error('Sheets sync failed:', error);
                            setSyncStatus('error');
                            setSyncMessage('Failed to save to Sheets - data saved locally');
                        });
                }
            };

            const handlePrizeRedemption = () => {
                if (!studentInfo) {
                    showAlert('Please enter a valid student ID', 'error');
                    return;
                }

                if (!selectedPrize) {
                    showAlert('Please select a prize', 'error');
                    return;
                }

                const currentPoints = calculateCumulativePoints(studentInfo.id);

                if (currentPoints < selectedPrize.points) {
                    showAlert(`Insufficient points! Student has ${currentPoints} points but needs ${selectedPrize.points}`, 'error');
                    return;
                }

                const prizeSize = prompt('Enter size (if applicable, e.g., S/M/L) or press OK:');

                const redemptionSwipe = {
                    studentId: studentInfo.id,
                    firstName: studentInfo.firstName,
                    lastName: studentInfo.lastName,
                    email: studentInfo.email,
                    degreeLevel: studentInfo.degreeLevel,
                    pointsEarned: 0,
                    pointsRedeemed: selectedPrize.points,
                    prizeRedeemed: selectedPrize.name,
                    size: prizeSize || null,
                    date: getTodaysDate(),
                    timestamp: new Date().toISOString()
                };

                // 1. Update local state immediately
                setSwipes([...swipes, redemptionSwipe]);

                const activity = {
                    timestamp: new Date().toISOString(),
                    type: 'redemption',
                    message: `${studentInfo.firstName} ${studentInfo.lastName} redeemed ${selectedPrize.name} (${selectedPrize.points} points)`
                };
                setRecentActivities([activity, ...recentActivities.slice(0, 49)]);

                showAlert(`✓ Prize redeemed! ${selectedPrize.points} points deducted. Remaining: ${currentPoints - selectedPrize.points}`, 'success');
                resetForm();

                // 2. Sync to Google Sheets (async, non-blocking)
                if (SYNC_ENABLED) {
                    setSyncStatus('syncing');
                    setSyncMessage('Saving redemption to Google Sheets...');
                    SheetsAPI.addSwipe(redemptionSwipe)
                        .then(() => {
                            setSyncStatus('success');
                            setSyncMessage('Saved to Google Sheets');
                            setTimeout(() => setSyncStatus('idle'), 2000);
                        })
                        .catch(error => {
                            console.error('Sheets sync failed:', error);
                            setSyncStatus('error');
                            setSyncMessage('Failed to save to Sheets - data saved locally');
                        });
                }
            };

            const handleDeleteTodayEntry = (studentId) => {
                if (!studentId) {
                    showAlert('Please enter a student ID first', 'error');
                    return;
                }

                const today = getTodaysDate();
                const todayEntries = swipes.filter(s => s.studentId === studentId && s.date === today);
                
                if (todayEntries.length === 0) {
                    showAlert('No entries found for this student today', 'warning');
                    return;
                }

                const confirmDelete = window.confirm(
                    `Are you sure you want to delete today's entry for ${studentInfo?.firstName} ${studentInfo?.lastName}?\n\n` +
                    `This will remove ${todayEntries.length} transaction(s) from today.`
                );

                if (!confirmDelete) return;

                // 1. Update local state immediately
                const updatedSwipes = swipes.filter(s => !(s.studentId === studentId && s.date === today));
                setSwipes(updatedSwipes);

                const activity = {
                    timestamp: new Date().toISOString(),
                    type: 'deletion',
                    message: `Deleted today's entry for ${studentInfo?.firstName} ${studentInfo?.lastName}`
                };
                setRecentActivities([activity, ...recentActivities.slice(0, 49)]);

                showAlert(`✓ Successfully deleted today's entry`, 'success');

                // Refresh student info
                if (studentId.length === 9) {
                    const student = lookupStudent(studentId);
                    if (student) {
                        setStudentInfo(student);
                    }
                }

                // 2. Sync deletion to Google Sheets (async, non-blocking)
                if (SYNC_ENABLED) {
                    setSyncStatus('syncing');
                    setSyncMessage('Deleting from Google Sheets...');
                    SheetsAPI.deleteSwipes(studentId, today)
                        .then(() => {
                            setSyncStatus('success');
                            setSyncMessage('Deleted from Google Sheets');
                            setTimeout(() => setSyncStatus('idle'), 2000);
                        })
                        .catch(error => {
                            console.error('Sheets delete sync failed:', error);
                            setSyncStatus('error');
                            setSyncMessage('Failed to delete from Sheets - deleted locally only');
                        });
                }
            };

            const resetForm = () => {
                setStudentId('');
                setSelectedPoints(null);
                setFreeSpin(false);
                setFreeSpinActive(false);
                setFirstSpinPoints(0);
                setStudentInfo(null);
                setSelectedPrize(null);
                if (inputRef.current) {
                    inputRef.current.focus();
                }
            };

            const handleImportRoster = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    const workbook = XLSX.read(event.target.result, { type: 'binary' });
                    const sheetName = 'Students';
                    const worksheet = workbook.Sheets[sheetName];
                    
                    if (!worksheet) {
                        showAlert('No "Students" sheet found in Excel file', 'error');
                        return;
                    }

                    const data = XLSX.utils.sheet_to_json(worksheet);

                    const formattedStudents = data.map(row => ({
                        id: String(row['Nonunique Alternate Id'] || '').trim(),
                        firstName: row['First Name'] || row['Preferred FN'] || '',
                        lastName: row['Last Name'] || '',
                        email: row['Email'] || '',
                        degreeLevel: row['Primary Degree Link: Degree Level'] || '',
                        preferredYear: row['Pref Year'] || ''
                    })).filter(s => s.id && s.id.length === 9);

                    setStudents(formattedStudents);
                    showAlert(`✓ Successfully imported ${formattedStudents.length} students`, 'success');
                };
                reader.readAsBinaryString(file);
            };

            const handleImportSwipes = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                // Show loading message
                showAlert('⏳ Importing data... Please wait.', 'info');

                try {
                    const reader = new FileReader();
                    
                    reader.onload = (event) => {
                        // Use setTimeout to prevent blocking
                        setTimeout(() => {
                            try {
                                console.log('Reading file...');
                                const workbook = XLSX.read(event.target.result, { type: 'binary' });
                                
                                console.log('Workbook sheets:', workbook.SheetNames);
                                
                                if (!workbook.SheetNames.includes('Swipes')) {
                                    showAlert('No "Swipes" sheet found in Excel file', 'error');
                                    return;
                                }

                                const worksheet = workbook.Sheets['Swipes'];
                                
                                // Convert to JSON starting from row 3 (headers in row 3, data starts row 4)
                                const jsonData = XLSX.utils.sheet_to_json(worksheet, { 
                                    range: 2,
                                    defval: null,
                                    raw: false // Convert all to strings first for safety
                                });
                                
                                console.log('Parsed rows:', jsonData.length);
                                if (jsonData.length > 0) {
                                    console.log('Sample row:', jsonData[0]);
                                }

                                if (jsonData.length === 0) {
                                    showAlert('No data found in Swipes sheet', 'warning');
                                    return;
                                }

                                const importedSwipes = [];
                                let skippedCount = 0;

                                // Process each row
                                for (let i = 0; i < jsonData.length; i++) {
                                    const row = jsonData[i];
                                    
                                    // Get student ID and validate
                                    let studentId = '';
                                    if (row['ID'] !== null && row['ID'] !== undefined && row['ID'] !== '') {
                                        studentId = String(row['ID']).trim();
                                    }
                                    
                                    // Skip if ID is invalid
                                    if (!studentId || studentId.length !== 9 || studentId === 'NaN' || studentId === 'null') {
                                        skippedCount++;
                                        continue;
                                    }

                                    // Parse date
                                    let dateStr = getTodaysDate();
                                    if (row['Date Visited']) {
                                        try {
                                            const dateValue = row['Date Visited'];
                                            // Try to parse as date string
                                            const parsed = new Date(dateValue);
                                            if (!isNaN(parsed.getTime())) {
                                                dateStr = parsed.toISOString().split('T')[0];
                                            }
                                        } catch (err) {
                                            console.warn(`Date parsing error on row ${i}:`, err);
                                        }
                                    }

                                    // Parse points with safety checks
                                    let pointsEarned = 0;
                                    let pointsRedeemed = 0;
                                    
                                    if (row['Points Earned']) {
                                        const parsed = parseFloat(row['Points Earned']);
                                        if (!isNaN(parsed)) {
                                            pointsEarned = parsed;
                                        }
                                    }
                                    
                                    if (row['Points Redeemed']) {
                                        const parsed = parseFloat(row['Points Redeemed']);
                                        if (!isNaN(parsed)) {
                                            pointsRedeemed = parsed;
                                        }
                                    }

                                    // Create swipe record
                                    const swipe = {
                                        studentId: studentId,
                                        pointsEarned: pointsEarned,
                                        pointsRedeemed: pointsRedeemed,
                                        date: dateStr,
                                        prizeRedeemed: row['Prize Redeemed'] || null,
                                        size: row['Size'] || null,
                                        firstName: row['First'] || '',
                                        lastName: row['Last'] || '',
                                        degreeLevel: row['Degree level'] || '',
                                        email: row['Email'] || '',
                                        timestamp: new Date().toISOString()
                                    };

                                    importedSwipes.push(swipe);
                                }

                                console.log(`Processed: ${importedSwipes.length} valid, ${skippedCount} skipped`);

                                if (importedSwipes.length === 0) {
                                    showAlert('No valid swipe records found. All IDs were invalid or missing.', 'warning');
                                    return;
                                }

                                // Update state - this might be slow with large datasets
                                console.log('Updating state with', importedSwipes.length, 'new records...');
                                
                                // Use functional update to ensure we have latest state
                                setSwipes(prevSwipes => {
                                    console.log('Previous swipes:', prevSwipes.length);
                                    const newSwipes = [...prevSwipes, ...importedSwipes];
                                    console.log('New total:', newSwipes.length);
                                    return newSwipes;
                                });
                                
                                showAlert(`✓ Successfully imported ${importedSwipes.length} swipe records (${skippedCount} skipped)`, 'success');

                                // Sync imported swipes to Google Sheets
                                if (SYNC_ENABLED) {
                                    setSyncStatus('syncing');
                                    setSyncMessage(`Uploading ${importedSwipes.length} swipes to Google Sheets...`);
                                    SheetsAPI.bulkAddSwipes(importedSwipes)
                                        .then(() => {
                                            setSyncStatus('success');
                                            setSyncMessage('Swipes uploaded to Google Sheets');
                                            setTimeout(() => setSyncStatus('idle'), 3000);
                                        })
                                        .catch(error => {
                                            console.error('Sheets bulk sync failed:', error);
                                            setSyncStatus('error');
                                            setSyncMessage('Failed to upload swipes to Sheets');
                                        });
                                }

                            } catch (error) {
                                console.error('Parse error:', error);
                                console.error('Error stack:', error.stack);
                                showAlert(`Error parsing Excel file: ${error.message}`, 'error');
                            }
                        }, 100); // Small delay to let UI update
                    };
                    
                    reader.onerror = (error) => {
                        console.error('File read error:', error);
                        showAlert('Error reading file. Please try again.', 'error');
                    };
                    
                    reader.readAsBinaryString(file);
                    
                } catch (error) {
                    console.error('Import error:', error);
                    console.error('Error stack:', error.stack);
                    showAlert(`Error: ${error.message}`, 'error');
                }
            };

            const handleExportData = () => {
                const exportData = swipes.map(swipe => {
                    const cumulativePoints = calculateCumulativePoints(swipe.studentId);
                    return {
                        'ID': swipe.studentId,
                        'Points Earned': swipe.pointsEarned || '',
                        'Points Redeemed': swipe.pointsRedeemed || '',
                        'Date Visited': swipe.date,
                        'Cumulative Points': cumulativePoints,
                        'Prize Redeemed': swipe.prizeRedeemed || '',
                        'Size': swipe.size || '',
                        'First': swipe.firstName,
                        'Last': swipe.lastName,
                        'Degree level': swipe.degreeLevel,
                        'Email': swipe.email
                    };
                });

                const ws = XLSX.utils.json_to_sheet(exportData);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, 'Swipes');

                const today = new Date().toISOString().split('T')[0];
                XLSX.writeFile(wb, `Tartan_Tuesday_Export_${today}.xlsx`);
                showAlert('✓ Data exported successfully', 'success');
            };

            const getStatistics = () => {
                const uniqueStudents = new Set(swipes.map(s => s.studentId)).size;
                const totalVisits = swipes.filter(s => s.pointsEarned > 0).length;
                const todayVisits = swipes.filter(s => s.date === getTodaysDate() && s.pointsEarned > 0).length;
                const totalPointsEarned = swipes.reduce((sum, s) => sum + (s.pointsEarned || 0), 0);
                const totalPointsRedeemed = swipes.reduce((sum, s) => sum + (s.pointsRedeemed || 0), 0);
                const prizesRedeemed = swipes.filter(s => s.prizeRedeemed).length;

                return {
                    uniqueStudents,
                    totalVisits,
                    todayVisits,
                    totalPointsEarned,
                    totalPointsRedeemed,
                    prizesRedeemed
                };
            };

            const getStudentHistory = () => {
                const studentMap = {};
                
                swipes.forEach(swipe => {
                    if (!studentMap[swipe.studentId]) {
                        studentMap[swipe.studentId] = {
                            id: swipe.studentId,
                            firstName: swipe.firstName,
                            lastName: swipe.lastName,
                            email: swipe.email,
                            visits: 0,
                            totalEarned: 0,
                            totalRedeemed: 0,
                            lastVisit: null
                        };
                    }
                    
                    const student = studentMap[swipe.studentId];
                    if (swipe.pointsEarned > 0) student.visits++;
                    student.totalEarned += swipe.pointsEarned || 0;
                    student.totalRedeemed += swipe.pointsRedeemed || 0;
                    
                    if (!student.lastVisit || swipe.date > student.lastVisit) {
                        student.lastVisit = swipe.date;
                    }
                });

                return Object.values(studentMap).map(student => ({
                    ...student,
                    cumulativePoints: student.totalEarned - student.totalRedeemed
                }));
            };

            const filteredStudentHistory = getStudentHistory().filter(student =>
                student.firstName.toLowerCase().includes(searchTerm.toLowerCase()) ||
                student.lastName.toLowerCase().includes(searchTerm.toLowerCase()) ||
                student.id.includes(searchTerm)
            );

            // Sort the filtered results
            const sortedStudentHistory = [...filteredStudentHistory].sort((a, b) => {
                let compareA, compareB;

                switch(sortBy) {
                    case 'name':
                        compareA = `${a.firstName} ${a.lastName}`.toLowerCase();
                        compareB = `${b.firstName} ${b.lastName}`.toLowerCase();
                        break;
                    case 'id':
                        compareA = a.id;
                        compareB = b.id;
                        break;
                    case 'visits':
                        compareA = a.visits;
                        compareB = b.visits;
                        break;
                    case 'earned':
                        compareA = a.totalEarned;
                        compareB = b.totalEarned;
                        break;
                    case 'redeemed':
                        compareA = a.totalRedeemed;
                        compareB = b.totalRedeemed;
                        break;
                    case 'current':
                        compareA = a.cumulativePoints;
                        compareB = b.cumulativePoints;
                        break;
                    case 'lastVisit':
                    default:
                        compareA = a.lastVisit || '1900-01-01';
                        compareB = b.lastVisit || '1900-01-01';
                        break;
                }

                // Handle numeric vs string comparison
                if (typeof compareA === 'number') {
                    return sortOrder === 'asc' ? compareA - compareB : compareB - compareA;
                } else {
                    if (sortOrder === 'asc') {
                        return compareA < compareB ? -1 : compareA > compareB ? 1 : 0;
                    } else {
                        return compareA > compareB ? -1 : compareA < compareB ? 1 : 0;
                    }
                }
            });

            const handleSort = (field) => {
                if (sortBy === field) {
                    // Toggle order if clicking same field
                    setSortOrder(sortOrder === 'asc' ? 'desc' : 'asc');
                } else {
                    // New field, default to desc
                    setSortBy(field);
                    setSortOrder('desc');
                }
            };

            const stats = getStatistics();

            return (
                <div className="container">
                    {syncStatus !== 'idle' && (
                        <div className={`sync-indicator ${syncStatus}`}>
                            {(syncStatus === 'syncing' || syncStatus === 'loading') && (
                                <div className="sync-spinner"></div>
                            )}
                            {syncStatus === 'success' && '✓'}
                            {syncStatus === 'error' && '!'}
                            {syncMessage}
                        </div>
                    )}

                    {isInitialLoading && (
                        <div className="loading-overlay">
                            <div className="sync-spinner" style={{width: '40px', height: '40px', borderWidth: '3px'}}></div>
                            <h2>Loading from Google Sheets...</h2>
                            <p>This may take a few seconds</p>
                        </div>
                    )}

                    <div className="header">
                        <div className="header-content">
                            <div className="tartans-badge">CMU TARTANS</div>
                            <h1>🎡 TARTAN TUESDAY</h1>
                            <p>STUDENT ENGAGEMENT MANAGER</p>
                        </div>
                    </div>

                    {alert && (
                        <div className={`alert alert-${alert.type}`}>
                            {alert.message}
                        </div>
                    )}

                    <div className="tab-buttons">
                        <button 
                            className={`tab-btn ${activeTab === 'check-in' ? 'active' : ''}`}
                            onClick={() => setActiveTab('check-in')}
                        >
                            Check-In
                        </button>
                        <button 
                            className={`tab-btn ${activeTab === 'redeem' ? 'active' : ''}`}
                            onClick={() => setActiveTab('redeem')}
                        >
                            Redeem Prize
                        </button>
                        <button 
                            className={`tab-btn ${activeTab === 'statistics' ? 'active' : ''}`}
                            onClick={() => setActiveTab('statistics')}
                        >
                            Statistics
                        </button>
                        <button 
                            className={`tab-btn ${activeTab === 'history' ? 'active' : ''}`}
                            onClick={() => setActiveTab('history')}
                        >
                            Student History
                        </button>
                        <button 
                            className={`tab-btn ${activeTab === 'data' ? 'active' : ''}`}
                            onClick={() => setActiveTab('data')}
                        >
                            Data Management
                        </button>
                    </div>

                    {activeTab === 'check-in' && (
                        <div className="main-content">
                            <div className="card">
                                <h2>Student Check-In</h2>
                                <div className="input-group">
                                    <label>Student ID (9 digits)</label>
                                    <input
                                        ref={inputRef}
                                        type="text"
                                        value={studentId}
                                        onChange={handleStudentIdChange}
                                        placeholder="Swipe card or enter ID..."
                                        maxLength="9"
                                        autoFocus
                                    />
                                </div>

                                {studentInfo && (
                                    <div className="student-info">
                                        <h3>Student Information</h3>
                                        {studentInfo.alreadySpunToday && (
                                            <div style={{
                                                padding: '15px',
                                                background: 'linear-gradient(135deg, rgba(220, 38, 38, 0.2) 0%, rgba(153, 27, 27, 0.2) 100%)',
                                                borderRadius: '12px',
                                                border: '2px solid #dc2626',
                                                marginBottom: '15px',
                                                textAlign: 'center',
                                                fontWeight: 'bold',
                                                color: '#fca5a5',
                                                fontSize: '1.05em'
                                            }}>
                                                ⚠️ This student has already spun the wheel today and cannot check in again.
                                            </div>
                                        )}
                                        <div className="student-info-grid">
                                            <span className="student-info-label">Name:</span>
                                            <span className="student-info-value">{studentInfo.firstName} {studentInfo.lastName}</span>
                                            
                                            <span className="student-info-label">Email:</span>
                                            <span className="student-info-value">{studentInfo.email}</span>
                                            
                                            <span className="student-info-label">Degree:</span>
                                            <span className="student-info-value">{studentInfo.degreeLevel}</span>
                                            
                                            <span className="student-info-label">Current Points:</span>
                                            <span className="student-info-value" style={{fontSize: '2em', fontWeight: 'bold', color: '#dc2626'}}>
                                                {studentInfo.cumulativePoints}
                                            </span>
                                            
                                            <span className="student-info-label">Status:</span>
                                            <span className="student-info-value">
                                                {studentInfo.alreadySpunToday ? 
                                                    '✓ Already checked in today' : 
                                                    (studentInfo.isFirstTime ? '🌟 First Visit!' : `Visit #${studentInfo.visitCount + 1}`)}
                                            </span>
                                        </div>
                                        {studentInfo.alreadySpunToday && (
                                            <button 
                                                className="btn btn-secondary" 
                                                onClick={() => handleDeleteTodayEntry(studentInfo.id)}
                                                style={{marginTop: '15px', background: 'rgba(220, 38, 38, 0.2)', borderColor: '#dc2626'}}
                                            >
                                                <span style={{position: 'relative', zIndex: 1}}>🗑️ Delete Today's Entry</span>
                                            </button>
                                        )}
                                    </div>
                                )}

                                <div className="input-group">
                                    <label>Points from Wheel Spin</label>
                                    {freeSpinActive && (
                                        <div style={{
                                            padding: '15px',
                                            background: 'linear-gradient(135deg, rgba(251, 191, 36, 0.2) 0%, rgba(245, 158, 11, 0.2) 100%)',
                                            borderRadius: '12px',
                                            border: '2px solid #fbbf24',
                                            marginBottom: '15px',
                                            textAlign: 'center',
                                            fontWeight: 'bold',
                                            color: '#fbbf24',
                                            fontSize: '1.1em'
                                        }}>
                                            🎰 FREE SPIN ACTIVE! Student already has 2 points. Select their second spin result below:
                                        </div>
                                    )}
                                    <div className="points-buttons">
                                        {POINT_OPTIONS.map(points => (
                                            <button
                                                key={points}
                                                className={`point-btn ${selectedPoints === points ? 'selected' : ''}`}
                                                onClick={() => setSelectedPoints(points)}
                                                disabled={freeSpinActive && points === 'free'}
                                            >
                                                <span style={{position: 'relative', zIndex: 1}}>
                                                    {points} pt{points !== 1 ? 's' : ''}
                                                </span>
                                            </button>
                                        ))}
                                        <button
                                            className={`point-btn free-spin ${selectedPoints === 'free' ? 'selected' : ''}`}
                                            onClick={() => setSelectedPoints('free')}
                                            disabled={freeSpinActive}
                                            style={freeSpinActive ? {opacity: 0.5, cursor: 'not-allowed'} : {}}
                                        >
                                            <span style={{position: 'relative', zIndex: 1}}>
                                                Free Spin
                                            </span>
                                        </button>
                                    </div>
                                </div>

                                <button
                                    className="btn btn-primary"
                                    onClick={handleCheckIn}
                                    disabled={!studentInfo || selectedPoints === null || studentInfo.alreadySpunToday}
                                >
                                    <span style={{position: 'relative', zIndex: 1}}>
                                        {studentInfo?.alreadySpunToday ? 'Already Checked In Today' : 'Complete Check-In'}
                                    </span>
                                </button>

                                <button className="btn btn-secondary" onClick={resetForm}>
                                    <span style={{position: 'relative', zIndex: 1}}>Clear Form</span>
                                </button>
                            </div>

                            <div className="card">
                                <h2>Recent Activity</h2>
                                <div className="recent-activities">
                                    {recentActivities.length === 0 ? (
                                        <p style={{color: '#666', textAlign: 'center', padding: '20px'}}>
                                            No recent activity
                                        </p>
                                    ) : (
                                        recentActivities.map((activity, index) => (
                                            <div key={index} className="activity-item">
                                                <div className="activity-time">
                                                    {new Date(activity.timestamp).toLocaleTimeString()}
                                                </div>
                                                <div className="activity-details">
                                                    {activity.message}
                                                </div>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {activeTab === 'redeem' && (
                        <div className="main-content">
                            <div className="card">
                                <h2>Prize Redemption</h2>
                                <div className="input-group">
                                    <label>Student ID (9 digits)</label>
                                    <input
                                        type="text"
                                        value={studentId}
                                        onChange={handleStudentIdChange}
                                        placeholder="Swipe card or enter ID..."
                                        maxLength="9"
                                    />
                                </div>

                                {studentInfo && (
                                    <div className="student-info">
                                        <h3>Student Information</h3>
                                        <div className="student-info-grid">
                                            <span className="student-info-label">Name:</span>
                                            <span className="student-info-value">{studentInfo.firstName} {studentInfo.lastName}</span>
                                            
                                            <span className="student-info-label">Points:</span>
                                            <span className="student-info-value" style={{fontSize: '2em', fontWeight: 'bold', color: '#dc2626'}}>
                                                {studentInfo.cumulativePoints}
                                            </span>
                                        </div>
                                    </div>
                                )}

                                <div className="input-group">
                                    <label>Select Prize</label>
                                    <div className="prize-grid">
                                        {PRIZES.map((prize, index) => (
                                            <div
                                                key={index}
                                                className={`prize-item ${selectedPrize === prize ? 'selected' : ''}`}
                                                onClick={() => setSelectedPrize(prize)}
                                            >
                                                <div className="prize-points">{prize.points} points</div>
                                                <div className="prize-name">{prize.name}</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <button
                                    className="btn btn-primary"
                                    onClick={handlePrizeRedemption}
                                    disabled={!studentInfo || !selectedPrize}
                                >
                                    <span style={{position: 'relative', zIndex: 1}}>Redeem Prize</span>
